name: Build Store APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build APK with Microsoft PWABuilder
        uses: pwa-builder/pwa-builder-action@v1
        with:
          url: https://alfajr-yr3u.vercel.app
          name: Alfajr Store
          packageId: com.alfajr.store
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alfajr-Store-APK
          path: ./artifacts/*.apk
