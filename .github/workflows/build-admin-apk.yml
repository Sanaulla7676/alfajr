name: Build Admin APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build APK from Admin PWA
        uses: vancat/pwa-to-apk-action@v1
        with:
          url: https://alfajr-yr3u.vercel.app/admin/login
          name: Alfajr Admin
          package_id: com.alfajr.admin
          icon_url: https://alfajr-yr3u.vercel.app/icons/icon-512x512.png
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alfajr-Admin-APK
          path: ./*.apk
