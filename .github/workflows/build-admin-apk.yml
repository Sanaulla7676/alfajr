name: Build Admin APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate APK via PWABuilder API
        run: |
          curl -X POST "https://pwabuilder-cloud-apiv2.azurewebsites.net/api/Manifest/build" \
          -H "Content-Type: application/json" \
          -d '{"url":"https://alfajr-yr3u.vercel.app/admin/login","platform":"android"}' \
          -o admin-app.zip
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alfajr-Admin-Package
          path: admin-app.zip
